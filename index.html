<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pop Archive</title>
    
    <!-- PWA 설정 (앱 설치 및 주소창 제거용) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PopLog">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF69B4">

    <!-- 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #FFF5F7; 
            margin: 0; 
            padding: 0; 
            overscroll-behavior-y: contain; /* 당겨서 새로고침 방지 */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .font-pop { font-family: 'Black Han Sans', sans-serif; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-bounce:active { transform: scale(0.95); transition: transform 0.1s; }
        
        .neo-card { 
            border: 4px solid #0F172A; 
            box-shadow: 6px 6px 0px 0px rgba(15,23,42,1); 
            background-color: white; 
            border-radius: 2.5rem; 
        }
        
        .neo-input { 
            border: 2px solid #0F172A; 
            border-radius: 1rem; 
            padding: 0.5rem 1rem; 
            outline: none; 
            transition: all 0.2s; 
            -webkit-user-select: text; 
            user-select: text; 
        }
        
        #root { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('성공!'))
                    .catch(err => console.log('실패:', err));
            });
        }

        const Icon = ({ name, size = 24, className = "", color = "currentColor" }) => {
            const icons = window.lucide ? window.lucide.icons : null;
            const iconData = icons ? icons[name] : null;
            if (!iconData) return <div style={{width: size, height: size}} className="inline-block" />;
            const svgContent = iconData.map(tag => {
                const [tagName, attrs] = tag;
                const attrString = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                return `<${tagName} ${attrString} />`;
            }).join('');
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: svgContent }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('routine');
            const [selectedDate, setSelectedDate] = useState('2024-04-20');

            // 데이터 로드
            const load = (key, initial) => {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : initial;
            };

            const [routines, setRoutines] = useState(() => load('pop_routines', [{ id: 1, text: "매일 운동하기 🏋️", type: 'daily', subTasks: [{id: 101, text: "홈트"}, {id: 102, text: "러닝"}] }]));
            const [notToDo, setNotToDo] = useState(() => load('pop_nottodo', ["자기 전 스마트폰 금지 📵"]));
            const [plannerData, setPlannerData] = useState(() => load('pop_plannerdata', {})); 
            const [workoutLinks, setWorkoutLinks] = useState(() => load('pop_workoutlinks', []));
            const [xp, setXp] = useState(() => load('pop_xp', 0));
            const [level, setLevel] = useState(() => load('pop_level', 1));
            
            // 입력 상태
            const [newRoutineText, setNewRoutineText] = useState('');
            const [newRoutineType, setNewRoutineType] = useState('daily');
            const [newTodoText, setNewTodoText] = useState('');

            // 자동 저장
            useEffect(() => { localStorage.setItem('pop_routines', JSON.stringify(routines)); }, [routines]);
            useEffect(() => { localStorage.setItem('pop_nottodo', JSON.stringify(notToDo)); }, [notToDo]);
            useEffect(() => { localStorage.setItem('pop_plannerdata', JSON.stringify(plannerData)); }, [plannerData]);
            useEffect(() => { localStorage.setItem('pop_workoutlinks', JSON.stringify(workoutLinks)); }, [workoutLinks]);
            useEffect(() => { localStorage.setItem('pop_xp', JSON.stringify(xp)); }, [xp]);
            useEffect(() => { localStorage.setItem('pop_level', JSON.stringify(level)); }, [level]);

            const currentDay = useMemo(() => plannerData[selectedDate] || { 
                todos: [], routineChecks: {}, isOff: false, offReason: "" 
            }, [plannerData, selectedDate]);

            const updateDayData = (updatedFields) => {
                setPlannerData(prev => ({ ...prev, [selectedDate]: { ...currentDay, ...updatedFields } }));
            };

            const gainXp = (amount) => {
                setXp(prev => {
                    const next = prev + amount;
                    if (next >= 100) { setLevel(l => l + 1); return next - 100; }
                    return next;
                });
            };

            const toggleCheck = (rid, sid) => {
                const key = `${rid}_sid_${sid}`;
                const existing = currentDay.routineChecks?.[key] || { checked: false, detail: "" };
                const isChecking = !existing.checked;
                if (isChecking) gainXp(15);
                updateDayData({ routineChecks: { ...(currentDay.routineChecks || {}), [key]: { ...existing, checked: isChecking } } });
            };

            const TabButton = ({ id, icon, label, color }) => (
                <button onClick={() => setActiveTab(id)} className={`flex flex-col items-center flex-1 py-3 transition-all active-bounce ${activeTab === id ? color : 'text-slate-400'}`}>
                    <Icon name={icon} size={22} className={activeTab === id ? 'animate-bounce' : ''} />
                    <span className="text-[9px] font-black uppercase mt-1 tracking-widest">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <header className="px-6 pt-12 pb-2 shrink-0 bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-[#FF69B4] border-2 border-slate-900 rounded-2xl flex items-center justify-center rotate-6 shadow-[3px_3px_0px_0px_black]">
                                    <Icon name="Archive" size={20} color="white" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-pop text-[#FF1493] tracking-tighter uppercase leading-none">Pop Archive</h1>
                                    <div className="flex items-center gap-1.5 mt-1">
                                        <span className="text-[10px] font-black bg-[#ADFF2F] px-1.5 rounded border border-slate-900 shadow-[1px_1px_0px_0px_black]">LV.{level}</span>
                                        <div className="w-28 h-1.5 bg-white border border-slate-900 rounded-full overflow-hidden">
                                            <div className="h-full bg-[#FF69B4] transition-all duration-500" style={{ width: `${xp}%` }} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="px-3 py-1 bg-white border-2 border-slate-900 rounded-full text-[9px] font-black shadow-[2px_2px_0px_0px_black] uppercase">{activeTab}</div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 pb-40 no-scrollbar">
                        {activeTab === 'routine' && (
                            <div className="space-y-6 py-4 animate-in slide-in-from-bottom-4">
                                <div className="flex items-center justify-between bg-white p-3 neo-card">
                                    <button onClick={() => { let d = new Date(selectedDate); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 bg-[#FFEB3B] border-2 border-slate-900 rounded-xl active-bounce"><Icon name="ChevronLeft" size={20}/></button>
                                    <div className="text-center font-black text-slate-900 text-sm italic underline decoration-[#FF69B4] decoration-2">{selectedDate}</div>
                                    <button onClick={() => { let d = new Date(selectedDate); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 bg-[#FFEB3B] border-2 border-slate-900 rounded-xl active-bounce"><Icon name="ChevronRight" size={20}/></button>
                                </div>

                                <div className={`neo-card p-5 transition-all duration-300 ${currentDay.isOff ? 'bg-slate-900 text-white' : 'bg-[#FFF9C4]'}`}>
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-2"><Icon name="Coffee" size={20} color={currentDay.isOff ? "white" : "black"} /><span className="text-xs font-black uppercase tracking-widest">Routine OFF</span></div>
                                        <button onClick={() => updateDayData({ isOff: !currentDay.isOff })} className={`px-5 py-2 rounded-full text-[10px] font-black border-2 border-slate-900 shadow-[3px_3px_0_0_black] active-bounce ${currentDay.isOff ? 'bg-[#FF69B4] text-white' : 'bg-white text-slate-900'}`}>{currentDay.isOff ? 'ON!' : 'OFF?'}</button>
                                    </div>
                                    {currentDay.isOff && <input type="text" placeholder="휴식 사유..." className="w-full neo-input text-xs bg-white text-slate-900 border-none" value={currentDay.offReason || ""} onChange={(e) => updateDayData({ offReason: e.target.value })} />}
                                </div>

                                <div className={`space-y-8 transition-all duration-500 ${currentDay.isOff ? 'opacity-20 pointer-events-none blur-[2px]' : ''}`}>
                                    {['daily', 'weekly', 'monthly'].map(type => (
                                        <section key={type} className="space-y-4">
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 ml-4 flex items-center gap-2"><div className={`w-2 h-2 rounded-full ${type === 'daily' ? 'bg-[#FF69B4]' : type === 'weekly' ? 'bg-[#ADFF2F]' : 'bg-[#2196F3]'}`} />{type}</h3>
                                            {routines.filter(r => r.type === type).map(r => (
                                                <div key={r.id} className="neo-card p-6 bg-white space-y-5">
                                                    <div className="flex justify-between items-center"><h4 className="text-md font-black text-slate-800 tracking-tighter">{r.text}</h4><button onClick={() => setRoutines(routines.filter(x => x.id !== r.id))} className="text-slate-200 hover:text-red-500"><Icon name="Trash2" size={18}/></button></div>
                                                    <div className="space-y-4">
                                                        {(r.subTasks || []).map(sub => {
                                                            const ck = currentDay.routineChecks?.[`${r.id}_sid_${sub.id}`] || { checked: false, detail: "" };
                                                            return (
                                                                <div key={sub.id} className="space-y-2 group">
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex items-center gap-3"><button onClick={() => toggleCheck(r.id, sub.id)} className={`active-bounce transition-all ${ck.checked ? 'text-[#ADFF2F]' : 'text-slate-200'}`}>{ck.checked ? <Icon name="CheckCircle" size={30} /> : <div className="w-7 h-7 rounded-xl border-4 border-slate-100" />}</button><span className={`text-sm font-bold ${ck.checked ? 'line-through text-slate-300 italic' : 'text-slate-700'}`}>{sub.text}</span></div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </section>
                                    ))}
                                    <div className="neo-card p-6 border-dashed bg-[#F8FAFC]">
                                        <div className="flex gap-2 mb-3">
                                            {['daily', 'weekly', 'monthly'].map(t => (
                                                <button key={t} onClick={() => setNewRoutineType(t)} className={`flex-1 py-1.5 rounded-xl text-[9px] font-black uppercase border-2 transition-all ${newRoutineType === t ? 'bg-[#FF69B4] text-white border-slate-900 shadow-[3px_3px_0 0 black]' : 'bg-white text-slate-400 border-slate-200'}`}>{t}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="새 루틴 명칭..." className="flex-1 neo-input text-sm" value={newRoutineText} onChange={e => setNewRoutineText(e.target.value)} />
                                            <button onClick={() => { if(!newRoutineText) return; setRoutines([...routines, { id: Date.now(), text: newRoutineText, type: newRoutineType, subTasks: [] }]); setNewRoutineText(''); gainXp(10); }} className="bg-[#ADFF2F] border-2 border-slate-900 p-3 rounded-2xl active-bounce shadow-[3px_3px_0 0 black]"><Icon name="Plus" size={20}/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="py-6 space-y-6 animate-in zoom-in text-center">
                                <Icon name="Library" size={56} className="text-[#ADFF2F] mb-4 mx-auto" />
                                <h2 className="text-3xl font-pop text-[#0F172A] uppercase italic leading-none">Archive</h2>
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-3 underline decoration-[#ADFF2F] decoration-4 mb-10">Your Daily Footprints</p>
                                <div className="space-y-4">
                                    {Object.keys(plannerData).sort().reverse().map(date => (
                                        <div key={date} className="neo-card p-6 text-left">
                                            <h4 className="font-pop text-lg text-[#FF69B4] italic uppercase mb-2">{date}</h4>
                                            <p className="text-xs font-bold text-slate-400 tracking-widest uppercase">Data Logged</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'task' && (
                            <div className="py-4 space-y-12 animate-in slide-in-from-left-4">
                                <section className="neo-card p-8 bg-white">
                                    <h3 className="text-md font-pop uppercase italic text-blue-500 mb-8 flex items-center gap-3"><Icon name="CheckSquare" size={24}/> Todo List</h3>
                                    <div className="space-y-5 mb-8">
                                        {(currentDay.todos || []).map(todo => (
                                            <div key={todo.id} className="flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <button onClick={() => {
                                                        const updated = currentDay.todos.map(t => t.id === todo.id ? {...t, completed: !t.completed} : t);
                                                        if(!todo.completed) gainXp(20);
                                                        updateDayData({ todos: updated });
                                                    }} className={`active-bounce transition-all ${todo.completed ? 'text-blue-500' : 'text-slate-200'}`}>
                                                        {todo.completed ? <Icon name="CheckCircle" size={36} /> : <div className="w-8 h-8 rounded-2xl border-4 border-slate-100" />}
                                                    </button>
                                                    <span className={`text-sm font-black ${todo.completed ? 'line-through text-slate-300 italic' : 'text-slate-700'}`}>{todo.text}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 p-3 bg-slate-50 rounded-2xl border-4 border-slate-900 shadow-inner">
                                        <input type="text" placeholder="할 일 적기" className="flex-1 bg-transparent text-sm font-black px-2 outline-none text-slate-900" value={newTodoText} onChange={e => setNewTodoText(e.target.value)} onKeyDown={e => e.key === 'Enter' && (updateDayData({ todos: [...currentDay.todos, {id: Date.now(), text: newTodoText, completed: false}]}), setNewTodoText(''))} />
                                        <button onClick={() => { if(!newTodoText) return; updateDayData({ todos: [...currentDay.todos, {id: Date.now(), text: newTodoText, completed: false}]}); setNewTodoText(''); gainXp(10); }} className="bg-[#FFEB3B] border-2 border-slate-900 p-3 rounded-xl active-bounce shadow-[3px_3px_0 0 black]"><Icon name="Plus" size={26}/></button>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-slate-900 px-6 pb-12 pt-3 flex justify-between items-center z-50">
                        <TabButton id="routine" icon="Layout" label="Routine" color="text-[#FF69B4]" />
                        <TabButton id="stats" icon="Archive" label="Archive" color="text-[#ADFF2F]" />
                        <div className="relative -mt-20"><button onClick={() => setActiveTab('routine')} className="w-18 h-18 bg-[#FFEB3B] border-4 border-slate-900 rounded-full flex items-center justify-center shadow-[5px_5px_0px_0px_black] active-bounce p-4"><Icon name="Zap" size={32} color="black" /></button></div>
                        <TabButton id="hub" icon="PlayCircle" label="Hub" color="text-[#2196F3]" />
                        <TabButton id="task" icon="CheckCircle" label="Todo" color="text-[#9C27B0]" />
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
