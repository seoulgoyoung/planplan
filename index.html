<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pop Archive Planner</title>
    
    <!-- PWA 핵심 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PopLog">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF69B4">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            font-family: 'Noto Sans KR', sans-serif; background-color: #FFF5F7; margin: 0; padding: 0; 
            overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none;
        }
        .font-pop { font-family: 'Black Han Sans', sans-serif; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-bounce:active { transform: scale(0.95); transition: transform 0.1s; }
        .neo-card { border: 4px solid #0F172A; box-shadow: 6px 6px 0px 0px rgba(15,23,42,1); background-color: white; border-radius: 2.5rem; }
        .neo-input { border: 2px solid #0F172A; border-radius: 1rem; padding: 0.5rem 1rem; outline: none; transition: all 0.2s; -webkit-user-select: text; user-select: text; }
        .neo-input:focus { border-color: #FF69B4; }
        #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding-top: var(--sat); padding-bottom: var(--sab); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 서비스 워커 등록 (주소창 제거용)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol.startsWith('http')) {
                    navigator.serviceWorker.register('./sw.js').catch(err => console.warn(err));
                }
            });
        }

        const Icon = ({ name, size = 24, className = "", color = "currentColor" }) => {
            const icons = window.lucide ? window.lucide.icons : null;
            const iconData = icons ? icons[name] : null;
            if (!iconData) return <div style={{width: size, height: size}} className="inline-block" />;
            const svgContent = iconData.map(tag => {
                const [tagName, attrs] = tag;
                const attrString = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                return `<${tagName} ${attrString} />`;
            }).join('');
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: svgContent }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('routine');
            const [selectedDate, setSelectedDate] = useState('2024-04-20');

            const load = (key, initial) => {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : initial;
            };

            // --- States ---
            const [routines, setRoutines] = useState(() => load('pop_routines', [{ id: 1, text: "매일 운동하기 🏋️", subTasks: [{id: 101, text: "수영"}, {id: 102, text: "러닝"}] }]));
            const [plannerData, setPlannerData] = useState(() => load('pop_plannerdata', {})); 
            const [events, setEvents] = useState(() => load('pop_events', [])); 
            const [bucketList, setBucketList] = useState(() => load('pop_bucketlist', [])); // 버킷리스트 추가
            const [workoutLinks, setWorkoutLinks] = useState(() => load('pop_workoutlinks', []));
            const [xp, setXp] = useState(() => load('pop_xp', 0));
            const [level, setLevel] = useState(() => load('pop_level', 1));
            
            // --- Sync Storage ---
            useEffect(() => { localStorage.setItem('pop_routines', JSON.stringify(routines)); }, [routines]);
            useEffect(() => { localStorage.setItem('pop_plannerdata', JSON.stringify(plannerData)); }, [plannerData]);
            useEffect(() => { localStorage.setItem('pop_events', JSON.stringify(events)); }, [events]);
            useEffect(() => { localStorage.setItem('pop_bucketlist', JSON.stringify(bucketList)); }, [bucketList]);
            useEffect(() => { localStorage.setItem('pop_workoutlinks', JSON.stringify(workoutLinks)); }, [workoutLinks]);
            useEffect(() => { localStorage.setItem('pop_xp', JSON.stringify(xp)); }, [xp]);
            useEffect(() => { localStorage.setItem('pop_level', JSON.stringify(level)); }, [level]);

            // --- Input States ---
            const [newRoutineText, setNewRoutineText] = useState('');
            const [newRoutineType, setNewRoutineType] = useState('daily');
            const [subInputs, setSubInputs] = useState({});
            const [eventInput, setEventInput] = useState({ title: '', date: '', memo: '' });
            const [newTodo, setNewTodo] = useState('');
            const [newBucket, setNewBucket] = useState('');
            const [linkInput, setLinkInput] = useState({ title: '', url: '' });

            const currentDay = useMemo(() => plannerData[selectedDate] || { routineChecks: {}, todos: [], isOff: false, offReason: "" }, [plannerData, selectedDate]);

            const gainXp = (amount) => {
                setXp(prev => {
                    const next = prev + amount;
                    if (next >= 100) { setLevel(l => l + 1); return next - 100; }
                    return next;
                });
            };

            const updateDayData = (updatedFields) => {
                setPlannerData(prev => ({ ...prev, [selectedDate]: { ...currentDay, ...updatedFields } }));
            };

            const getDetailedArchiveLog = (date) => {
                const day = plannerData[date];
                const dayEvents = events.filter(e => e.date === date);
                if (!day && dayEvents.length === 0) return null;
                
                const logs = [];
                if (day?.isOff) return { type: 'OFF', reason: day.offReason, events: dayEvents };

                routines.forEach(r => {
                    (r.subTasks || []).forEach(s => {
                        if (day?.routineChecks?.[`${r.id}_sub_${s.id}`]) {
                            logs.push({ type: 'ROUTINE', category: r.text, task: s.text });
                        }
                    });
                });

                (day?.todos || []).forEach(t => {
                    if (t.completed) logs.push({ type: 'TODO', task: t.text });
                });

                return (logs.length > 0 || dayEvents.length > 0) ? { type: 'DONE', logs, events: dayEvents } : null;
            };

            const TabButton = ({ id, icon, label, color }) => (
                <button onClick={() => setActiveTab(id)} className={`flex flex-col items-center flex-1 py-3 transition-all active-bounce ${activeTab === id ? color : 'text-slate-400'}`}>
                    <Icon name={icon} size={20} className={activeTab === id ? 'animate-bounce' : ''} />
                    <span className="text-[8px] font-black uppercase mt-1 tracking-tighter">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <header className="px-6 pt-12 pb-2 shrink-0 bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-[#FF69B4] border-2 border-slate-900 rounded-2xl flex items-center justify-center rotate-6 shadow-[3px_3px_0px_0px_black]">
                                    <Icon name="Archive" size={20} color="white" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-pop text-[#FF1493] tracking-tighter uppercase leading-none">Pop Archive</h1>
                                    <div className="flex items-center gap-1.5 mt-1">
                                        <span className="text-[10px] font-black bg-[#ADFF2F] px-1.5 rounded border border-slate-900">LV.{level}</span>
                                        <div className="w-24 h-1.5 bg-white border border-slate-900 rounded-full overflow-hidden">
                                            <div className="h-full bg-[#FF69B4] transition-all duration-500" style={{ width: `${xp}%` }} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="px-3 py-1 bg-white border-2 border-slate-900 rounded-full text-[9px] font-black uppercase">{activeTab}</div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 pb-40 no-scrollbar">
                        
                        {/* 1. ROUTINE Tab */}
                        {activeTab === 'routine' && (
                            <div className="space-y-6 py-4 animate-in slide-in-from-bottom-4">
                                <div className="flex items-center justify-between bg-white p-3 neo-card">
                                    <button onClick={() => { let d = new Date(selectedDate); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 bg-[#FFEB3B] border-2 border-slate-900 rounded-xl active-bounce"><Icon name="ChevronLeft" size={20}/></button>
                                    <div className="text-center font-black text-slate-900 text-sm italic">{selectedDate}</div>
                                    <button onClick={() => { let d = new Date(selectedDate); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-2 bg-[#FFEB3B] border-2 border-slate-900 rounded-xl active-bounce"><Icon name="ChevronRight" size={20}/></button>
                                </div>

                                <div className={`neo-card p-5 transition-all duration-300 ${currentDay.isOff ? 'bg-slate-900 text-white' : 'bg-[#FFF9C4]'}`}>
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-2"><Icon name="Coffee" size={20} color={currentDay.isOff ? "white" : "black"} /><span className="text-xs font-black uppercase tracking-widest">Routine OFF</span></div>
                                        <button onClick={() => updateDayData({ isOff: !currentDay.isOff })} className={`px-5 py-2 rounded-full text-[10px] font-black border-2 border-slate-900 shadow-[3px_3px_0 0 black] active-bounce ${currentDay.isOff ? 'bg-[#FF69B4] text-white' : 'bg-white text-slate-900'}`}>{currentDay.isOff ? 'ON!' : 'OFF?'}</button>
                                    </div>
                                    {currentDay.isOff && <input type="text" placeholder="휴식 사유..." className="w-full neo-input text-xs bg-white text-slate-900 border-none mt-1" value={currentDay.offReason || ""} onChange={(e) => updateDayData({ offReason: e.target.value })} />}
                                </div>

                                <div className={`space-y-6 transition-all duration-500 ${currentDay.isOff ? 'opacity-20 pointer-events-none blur-[2px]' : ''}`}>
                                    {routines.map(r => (
                                        <div key={r.id} className="neo-card p-6 bg-white space-y-4">
                                            <div className="flex justify-between items-center border-b-2 border-slate-50 pb-2">
                                                <h4 className="text-md font-black text-slate-800 tracking-tighter italic">{r.text}</h4>
                                                <button onClick={() => setRoutines(routines.filter(x => x.id !== r.id))} className="text-slate-200 hover:text-red-400"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                            <div className="space-y-3 pl-2">
                                                {(r.subTasks || []).map(sub => (
                                                    <div key={sub.id} className="flex items-center justify-between group">
                                                        <div className="flex items-center gap-3">
                                                            <button onClick={() => {
                                                                const key = `${r.id}_sub_${sub.id}`;
                                                                const isChecked = !currentDay.routineChecks?.[key];
                                                                if (isChecked) gainXp(15);
                                                                updateDayData({ routineChecks: { ...currentDay.routineChecks, [key]: isChecked } });
                                                            }} className={`active-bounce transition-all ${currentDay.routineChecks?.[`${r.id}_sub_${sub.id}`] ? 'text-[#ADFF2F]' : 'text-slate-100'}`}>
                                                                {currentDay.routineChecks?.[`${r.id}_sub_${sub.id}`] ? <Icon name="CheckCircle" size={26} /> : <div className="w-6 h-6 rounded-lg border-4 border-slate-50" />}
                                                            </button>
                                                            <span className={`text-sm font-bold ${currentDay.routineChecks?.[`${r.id}_sub_${sub.id}`] ? 'line-through text-slate-300 italic' : 'text-slate-600'}`}>{sub.text}</span>
                                                        </div>
                                                        <button onClick={() => {
                                                            setRoutines(routines.map(rt => rt.id === r.id ? {...rt, subTasks: rt.subTasks.filter(s => s.id !== sub.id)} : rt));
                                                        }} className="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-300 transition-all"><Icon name="X" size={14}/></button>
                                                    </div>
                                                ))}
                                                <div className="flex gap-2 pt-2">
                                                    <input type="text" placeholder="상세 추가..." className="flex-1 text-[11px] neo-input border-dashed border-slate-200 bg-slate-50/30" 
                                                        value={subInputs[r.id] || ''} onChange={e => setSubInputs({...subInputs, [r.id]: e.target.value})}
                                                        onKeyDown={e => { if(e.key === 'Enter' && e.target.value) { setRoutines(routines.map(rt => rt.id === r.id ? {...rt, subTasks: [...(rt.subTasks || []), {id: Date.now(), text: e.target.value}]} : rt)); setSubInputs({...subInputs, [r.id]: ''}); gainXp(5); } }} />
                                                    <button onClick={() => { if(!subInputs[r.id]) return; setRoutines(routines.map(rt => rt.id === r.id ? {...rt, subTasks: [...(rt.subTasks || []), {id: Date.now(), text: subInputs[r.id]}]} : rt)); setSubInputs({...subInputs, [r.id]: ''}); gainXp(5); }} className="bg-white border-2 border-slate-900 p-2 rounded-xl active-bounce shadow-[2px_2px_0 0 black]"><Icon name="Plus" size={14}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="neo-card p-6 border-dashed bg-[#F8FAFC]">
                                        <div className="flex gap-2 mb-3">
                                            {['daily', 'weekly', 'monthly'].map(t => (
                                                <button key={t} onClick={() => setNewRoutineType(t)} className={`flex-1 py-1.5 rounded-xl text-[9px] font-black uppercase border-2 transition-all ${newRoutineType === t ? 'bg-[#FF69B4] text-white border-slate-900 shadow-[3px_3px_0 0 black]' : 'bg-white text-slate-400 border-slate-200'}`}>{t}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="새 루틴 명칭..." className="flex-1 neo-input text-sm" value={newRoutineText} onChange={e => setNewRoutineText(e.target.value)} />
                                            <button onClick={() => { if(!newRoutineText) return; setRoutines([...routines, { id: Date.now(), text: newRoutineText, type: newRoutineType, subTasks: [] }]); setNewRoutineText(''); gainXp(10); }} className="bg-[#ADFF2F] border-2 border-slate-900 p-3 rounded-2xl shadow-[3px_3px_0 0 black] active-bounce"><Icon name="Plus" size={20}/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. ARCHIVE Tab */}
                        {activeTab === 'stats' && (
                            <div className="py-6 space-y-6 animate-in zoom-in">
                                <div className="neo-card p-10 bg-white text-center">
                                    <Icon name="Library" size={56} className="text-[#ADFF2F] mb-4 mx-auto" />
                                    <h2 className="text-3xl font-pop text-[#0F172A] uppercase italic leading-none tracking-tighter">My Archive</h2>
                                    <p className="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em] mt-3 underline decoration-[#ADFF2F] decoration-4">History Log</p>
                                </div>
                                <div className="space-y-8 pb-20">
                                    {Object.keys(plannerData).concat(events.map(e => e.date)).filter((v, i, a) => a.indexOf(v) === i).sort().reverse().map(date => {
                                        const archive = getDetailedArchiveLog(date);
                                        if (!archive) return null;
                                        return (
                                            <div key={date} className="neo-card p-6 bg-white space-y-4">
                                                <div className="flex justify-between items-center mb-2 border-b-4 border-slate-50 pb-2">
                                                    <span className="font-pop text-lg text-[#FF69B4]">{date}</span>
                                                    <Icon name={archive.type === 'OFF' ? "Coffee" : "Award"} size={22} color="#ADFF2F" />
                                                </div>
                                                {archive.events && archive.events.length > 0 && archive.events.map(ev => (
                                                    <div key={ev.id} className="bg-[#FFEB3B]/20 p-3 rounded-2xl border-2 border-[#FFEB3B] border-dashed">
                                                        <p className="text-[10px] font-black text-[#FBC02D] uppercase tracking-widest italic mb-1">-- SPECIAL EVENT --</p>
                                                        <p className="text-sm font-black text-slate-800">{ev.title}</p>
                                                    </div>
                                                ))}
                                                {archive.type === 'OFF' ? (
                                                    <p className="text-center py-4 text-xs font-bold text-slate-400 italic">"{archive.reason || '잠시 쉬어가는 날 ✨'}"</p>
                                                ) : (
                                                    <div className="space-y-3">
                                                        {archive.logs.map((log, i) => (
                                                            <div key={i} className="flex flex-col gap-1 pl-3 border-l-4 border-slate-100">
                                                                <div className="flex items-center gap-2">
                                                                    <div className={`w-1.5 h-1.5 rounded-full ${log.type === 'ROUTINE' ? 'bg-[#FF69B4]' : 'bg-[#2196F3]'}`} />
                                                                    {log.category && <span className="text-[9px] font-black text-slate-400 uppercase italic leading-none">{log.category}</span>}
                                                                    <span className="text-xs font-bold text-slate-700">{log.task}</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* 3. HUB Tab */}
                        {activeTab === 'hub' && (
                            <div className="py-6 space-y-10 animate-in slide-in-from-right-4">
                                <section className="neo-card p-6 bg-[#E1F5FE] space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-md font-pop uppercase italic text-[#0288D1] flex items-center gap-3"><Icon name="PlayCircle" size={24}/> Tube Hub</h3>
                                    </div>
                                    <div className="space-y-4">
                                        {workoutLinks.map(link => (
                                            <div key={link.id} className="bg-white p-4 rounded-3xl border-2 border-slate-900 flex items-center justify-between shadow-[4px_4px_0 0 black]">
                                                <p className="text-xs font-black truncate flex-1 pr-4 text-slate-700">{link.title}</p>
                                                <div className="flex gap-2">
                                                    <a href={link.url} target="_blank" rel="noopener noreferrer" className="w-10 h-10 bg-[#0288D1] border-2 border-slate-900 rounded-full flex items-center justify-center text-white active-bounce"><Icon name="Play" size={16}/></a>
                                                    <button onClick={() => setWorkoutLinks(workoutLinks.filter(x => x.id !== link.id))} className="text-slate-200 hover:text-red-500"><Icon name="Trash2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-5 bg-white/60 rounded-[2rem] border-4 border-slate-900 border-dashed space-y-3">
                                        <input type="text" placeholder="영상 제목..." className="w-full neo-input text-xs" value={linkInput.title} onChange={e => setLinkInput({...linkInput, title: e.target.value})} />
                                        <div className="flex gap-3">
                                            <input type="text" placeholder="Youtube URL..." className="flex-1 neo-input text-xs" value={linkInput.url} onChange={e => setLinkInput({...linkInput, url: e.target.value})} />
                                            <button onClick={() => { if(!linkInput.title || !linkInput.url) return; setWorkoutLinks([...workoutLinks, {id: Date.now(), ...linkInput}]); setLinkInput({title:'', url:''}); gainXp(10); }} className="bg-[#0288D1] p-3 rounded-2xl border-2 border-slate-900 text-white active-bounce"><Icon name="Plus" size={20}/></button>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {/* 4. EVENTS Tab */}
                        {activeTab === 'events' && (
                            <div className="py-6 space-y-8 animate-in slide-in-from-right-4">
                                <div className="neo-card p-8 bg-white text-center">
                                    <Icon name="Star" size={48} className="text-[#FFEB3B] fill-[#FFEB3B] mx-auto mb-4" />
                                    <h2 className="text-2xl font-pop text-[#0F172A] uppercase">Event Log</h2>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2 underline decoration-[#FFEB3B] decoration-4">Memories</p>
                                </div>
                                <div className="neo-card p-6 bg-[#E3F2FD] space-y-4">
                                    <h3 className="font-black text-xs text-[#1E88E5] uppercase flex items-center gap-2"><Icon name="PenTool" size={14}/> Record Event</h3>
                                    <input type="text" placeholder="행사 제목 (예: 페스티벌)" className="w-full neo-input text-xs" value={eventInput.title} onChange={e => setEventInput({...eventInput, title: e.target.value})} />
                                    <input type="date" className="w-full neo-input text-xs" value={eventInput.date} onChange={e => setEventInput({...eventInput, date: e.target.value})} />
                                    <textarea placeholder="메모..." className="w-full neo-input text-xs h-20 resize-none" value={eventInput.memo} onChange={e => setEventInput({...eventInput, memo: e.target.value})} />
                                    <button onClick={() => { if(!eventInput.title || !eventInput.date) return; setEvents([...events, {id: Date.now(), ...eventInput}]); setEventInput({title:'', date:'', memo:''}); gainXp(30); }} className="w-full bg-[#1E88E5] text-white border-2 border-slate-900 py-3 rounded-2xl font-black shadow-[3px_3px_0 0 black] active-bounce uppercase text-xs">Save Memory</button>
                                </div>
                                <div className="space-y-4">
                                    {events.sort((a,b) => new Date(b.date) - new Date(a.date)).map(ev => (
                                        <div key={ev.id} className="neo-card p-6 bg-white relative animate-in zoom-in">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-[9px] font-black bg-[#FFEB3B] px-2 py-0.5 rounded border border-slate-900 shadow-[2px_2px_0 0 black]">{ev.date}</span>
                                                <button onClick={() => setEvents(events.filter(x => x.id !== ev.id))} className="text-slate-200 hover:text-red-400"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                            <h4 className="text-lg font-black text-slate-800 tracking-tighter italic">{ev.title}</h4>
                                            <p className="text-[11px] font-bold text-slate-500 italic mt-1 leading-snug">"{ev.memo}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 5. TODO Tab (Bucket List Included) */}
                        {activeTab === 'task' && (
                            <div className="py-6 space-y-12 animate-in slide-in-from-left-4">
                                {/* Todo Section */}
                                <section className="neo-card p-8 bg-white space-y-6">
                                    <h3 className="text-md font-pop uppercase italic text-[#2196F3] flex items-center gap-3"><Icon name="CheckSquare" size={24}/> Todo List</h3>
                                    <div className="space-y-4 mb-8">
                                        {(currentDay.todos || []).map((todo, idx) => (
                                            <div key={idx} className="flex items-center justify-between group">
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => {
                                                        const updated = [...currentDay.todos];
                                                        updated[idx].completed = !updated[idx].completed;
                                                        if (updated[idx].completed) gainXp(15);
                                                        updateDayData({ todos: updated });
                                                    }} className={`active-bounce transition-all ${todo.completed ? 'text-[#2196F3]' : 'text-slate-100'}`}>
                                                        {todo.completed ? <Icon name="CheckCircle" size={30} /> : <div className="w-7 h-7 rounded-xl border-4 border-slate-50" />}
                                                    </button>
                                                    <span className={`text-sm font-black ${todo.completed ? 'line-through text-slate-300 italic' : 'text-slate-700 decoration-[#ADFF2F] decoration-4 underline-offset-4'}`}>{todo.text}</span>
                                                </div>
                                                <button onClick={() => updateDayData({ todos: currentDay.todos.filter((_, i) => i !== idx) })} className="text-slate-100 hover:text-red-400 active-bounce"><Icon name="X" size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 p-3 bg-slate-50 rounded-2xl border-4 border-slate-900 shadow-inner">
                                        <input type="text" placeholder="할 일 적기..." className="flex-1 bg-transparent text-sm font-black px-2 outline-none text-slate-900" value={newTodo} onChange={e => setNewTodo(e.target.value)} onKeyDown={e => { if(e.key === 'Enter' && newTodo) { updateDayData({ todos: [...(currentDay.todos || []), { text: newTodo, completed: false }]}); setNewTodo(''); gainXp(5); } }} />
                                        <button onClick={() => { if(!newTodo) return; updateDayData({ todos: [...(currentDay.todos || []), { text: newTodo, completed: false }]}); setNewTodo(''); gainXp(5); }} className="bg-[#FFEB3B] border-2 border-slate-900 p-3 rounded-xl active-bounce shadow-[3px_3px_0 0 black]"><Icon name="Plus" size={24}/></button>
                                    </div>
                                </section>

                                {/* 2026 Bucket List Section */}
                                <section className="neo-card p-8 bg-[#F3E5F5] space-y-6">
                                    <h3 className="text-md font-pop uppercase italic text-[#9C27B0] flex items-center gap-3"><Icon name="Trophy" size={24}/> 2026 Bucket List</h3>
                                    <div className="space-y-4 mb-8">
                                        {bucketList.map((item, idx) => (
                                            <div key={item.id} className="flex items-center justify-between group">
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => {
                                                        const updated = bucketList.map((b, i) => i === idx ? {...b, completed: !b.completed} : b);
                                                        if (!item.completed) gainXp(50); // 버킷리스트는 무려 50 XP!
                                                        setBucketList(updated);
                                                    }} className={`active-bounce transition-all ${item.completed ? 'text-[#9C27B0]' : 'text-slate-200'}`}>
                                                        {item.completed ? <Icon name="Sparkles" size={30} /> : <div className="w-7 h-7 rounded-full border-4 border-white shadow-sm" />}
                                                    </button>
                                                    <span className={`text-sm font-black ${item.completed ? 'line-through text-slate-400 italic' : 'text-[#4A148C]'}`}>{item.text}</span>
                                                </div>
                                                <button onClick={() => setBucketList(bucketList.filter((_, i) => i !== idx))} className="text-slate-300 hover:text-red-400"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 p-3 bg-white/50 rounded-2xl border-4 border-[#9C27B0] shadow-inner">
                                        <input type="text" placeholder="2026년에 이루고 싶은 꿈..." className="flex-1 bg-transparent text-sm font-black px-2 outline-none text-[#4A148C]" value={newBucket} onChange={e => setNewBucket(e.target.value)} onKeyDown={e => { if(e.key === 'Enter' && newBucket) { setBucketList([...bucketList, { id: Date.now(), text: newBucket, completed: false }]); setNewBucket(''); } }} />
                                        <button onClick={() => { if(!newBucket) return; setBucketList([...bucketList, { id: Date.now(), text: newBucket, completed: false }]); setNewBucket(''); }} className="bg-[#9C27B0] text-white p-3 rounded-xl active-bounce shadow-[3px_3px_0 0 black]"><Plus size={24}/></button>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-slate-900 px-6 pb-12 pt-3 flex justify-between items-center z-50">
                        <TabButton id="routine" icon="Layout" label="Routine" color="text-[#FF69B4]" />
                        <TabButton id="stats" icon="Archive" label="Archive" color="text-[#ADFF2F]" />
                        <div className="relative -mt-20"><button onClick={() => setActiveTab('routine')} className="w-18 h-18 bg-[#FFEB3B] border-4 border-slate-900 rounded-full flex items-center justify-center shadow-[5px_5px_0px_0px_black] active-bounce p-4"><Icon name="Zap" size={32} color="black" /></button></div>
                        <TabButton id="hub" icon="PlayCircle" label="Hub" color="text-[#0288D1]" />
                        <TabButton id="events" icon="Star" label="Events" color="text-[#FBC02D]" />
                        <TabButton id="task" icon="CheckCircle" label="Todo" color="text-[#9C27B0]" />
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
